<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background: deep space with warm purple undertone -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#15121F"/>
      <stop offset="50%" stop-color="#0F0D16"/>
      <stop offset="100%" stop-color="#0A090F"/>
    </linearGradient>

    <!-- Brand gradient (userSpaceOnUse for consistent fill+stroke) -->
    <linearGradient id="markGrad" x1="440" y1="220" x2="440" y2="680" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="40%" stop-color="#F44068"/>
      <stop offset="100%" stop-color="#E91E63"/>
    </linearGradient>

    <!-- Capsule glass highlight -->
    <linearGradient id="capsuleGloss" x1="50%" y1="0%" x2="50%" y2="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.22)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>

    <!-- Radial glow behind mark -->
    <radialGradient id="markGlow" cx="48%" cy="44%" r="28%">
      <stop offset="0%" stop-color="rgba(244, 64, 104, 0.22)"/>
      <stop offset="60%" stop-color="rgba(244, 64, 104, 0.06)"/>
      <stop offset="100%" stop-color="rgba(244, 64, 104, 0)"/>
    </radialGradient>

    <!-- Top gloss for squircle -->
    <linearGradient id="topGloss" x1="50%" y1="0%" x2="50%" y2="55%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.07)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>

    <!-- Drop shadow for squircle -->
    <filter id="shadow" x="-10%" y="-5%" width="120%" height="125%">
      <feDropShadow dx="0" dy="10" stdDeviation="22" flood-color="rgba(0,0,0,0.45)"/>
    </filter>

    <!-- Noise texture -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.035"/>
      </feComponentTransfer>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <!-- macOS squircle background -->
  <rect x="40" y="40" width="944" height="944" rx="212" ry="212"
        fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Noise texture overlay -->
  <rect x="40" y="40" width="944" height="944" rx="212" ry="212"
        fill="white" filter="url(#noise)" opacity="0.5"/>

  <!-- Glow behind mark -->
  <rect x="40" y="40" width="944" height="944" rx="212" ry="212"
        fill="url(#markGlow)"/>

  <!-- Top gloss highlight -->
  <rect x="40" y="40" width="944" height="480" rx="212" ry="212"
        fill="url(#topGloss)"/>

  <!-- ═══ THE MARK: Pod + Signal ═══ -->
  <g transform="translate(440, 400)">

    <!-- Capsule body (the pod) -->
    <rect x="-88" y="-155" width="176" height="286" rx="88" ry="88"
          fill="url(#markGrad)"/>

    <!-- Glass reflection on capsule -->
    <ellipse cx="-20" cy="-100" rx="50" ry="70"
             fill="url(#capsuleGloss)" opacity="0.6"/>

    <!-- Speaker grille — 3 dots arranged in triangle -->
    <circle cx="-24" cy="-88" r="12" fill="rgba(255,255,255,0.22)"/>
    <circle cx="24" cy="-88" r="12" fill="rgba(255,255,255,0.22)"/>
    <circle cx="0" cy="-58" r="12" fill="rgba(255,255,255,0.22)"/>

    <!-- Stem -->
    <rect x="-17" y="118" width="34" height="148" rx="17" ry="17"
          fill="url(#markGrad)" opacity="0.88"/>

    <!-- Stem tip -->
    <ellipse cx="0" cy="272" rx="23" ry="11"
             fill="url(#markGrad)" opacity="0.6"/>

    <!-- Signal arcs — emanating from right side -->
    <g fill="none" stroke-linecap="round">
      <!-- Arc 1: close, bold -->
      <path d="M 108,-82 Q 178,0 108,82"
            stroke="url(#markGrad)" stroke-width="14" opacity="0.88"/>
      <!-- Arc 2: medium -->
      <path d="M 148,-135 Q 240,0 148,135"
            stroke="url(#markGrad)" stroke-width="12" opacity="0.52"/>
      <!-- Arc 3: far, subtle -->
      <path d="M 185,-182 Q 298,0 185,182"
            stroke="url(#markGrad)" stroke-width="10" opacity="0.25"/>
    </g>
  </g>

  <!-- Subtle inner border for depth -->
  <rect x="40" y="40" width="944" height="944" rx="212" ry="212"
        fill="none" stroke="rgba(255,255,255,0.055)" stroke-width="2"/>
</svg>
