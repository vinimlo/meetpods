<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#15121F"/>
      <stop offset="100%" stop-color="#0A090F"/>
    </linearGradient>
    <linearGradient id="mark" x1="54" y1="22" x2="54" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="40%" stop-color="#F44068"/>
      <stop offset="100%" stop-color="#E91E63"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>

  <!-- Subtle glow -->
  <circle cx="54" cy="52" r="38" fill="rgba(244,64,104,0.1)"/>

  <!-- The Mark: Pod + Signal (optimized for 128px) -->
  <g transform="translate(54, 52)">
    <!-- Capsule body -->
    <rect x="-12" y="-22" width="24" height="38" rx="12" ry="12" fill="url(#mark)"/>

    <!-- Stem -->
    <rect x="-2.5" y="14" width="5" height="20" rx="2.5" ry="2.5"
          fill="url(#mark)" opacity="0.85"/>

    <!-- Stem tip -->
    <ellipse cx="0" cy="36" rx="3.5" ry="1.8" fill="url(#mark)" opacity="0.6"/>

    <!-- Signal arcs -->
    <g fill="none" stroke-linecap="round">
      <path d="M 15,-11 Q 25,0 15,11"
            stroke="url(#mark)" stroke-width="2.2" opacity="0.85"/>
      <path d="M 21,-18 Q 34,0 21,18"
            stroke="url(#mark)" stroke-width="1.8" opacity="0.48"/>
      <path d="M 27,-24 Q 42,0 27,24"
            stroke="url(#mark)" stroke-width="1.4" opacity="0.22"/>
    </g>
  </g>

  <!-- Subtle border -->
  <rect width="128" height="128" rx="28"
        fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
</svg>
