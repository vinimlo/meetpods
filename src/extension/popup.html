<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=320" />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap');

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg-deep: #0d0b12;
        --bg-surface: #14121c;
        --bg-card: #1c1a26;
        --bg-card-hover: #24222f;
        --border: #2c2938;
        --border-subtle: #221f2e;
        --text-primary: #f0ece5;
        --text-secondary: #9590a0;
        --text-dim: #5d586a;

        --brand-start: #ff6b35;
        --brand-mid: #f44068;
        --brand-end: #e91e63;

        --accent-green: #34d399;
        --accent-green-glow: rgba(52, 211, 153, 0.15);
        --accent-red: #fb7185;
        --accent-red-glow: rgba(251, 113, 133, 0.15);
        --accent-amber: #fbbf24;
        --accent-amber-glow: rgba(251, 191, 36, 0.12);
      }

      body {
        width: 300px;
        min-height: 180px;
        font-family:
          'Sora',
          -apple-system,
          sans-serif;
        background: var(--bg-deep);
        color: var(--text-primary);
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
      }

      /* ── Brand gradient line at top ── */
      .brand-line {
        height: 2px;
        background: linear-gradient(90deg, var(--brand-start), var(--brand-mid), var(--brand-end));
        opacity: 0.85;
      }

      /* ── Header ── */
      .header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 14px 16px 12px;
        border-bottom: 1px solid var(--border-subtle);
      }

      .header-icon {
        width: 30px;
        height: 30px;
        border-radius: 8px;
        background: linear-gradient(135deg, #15121f, #0f0d16);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        border: 1px solid var(--border);
        position: relative;
        overflow: hidden;
      }

      .header-icon::after {
        content: '';
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at 50% 40%, rgba(244, 64, 104, 0.12), transparent 70%);
      }

      .header-icon svg {
        width: 16px;
        height: 16px;
        position: relative;
        z-index: 1;
      }

      .header-meta {
        display: flex;
        flex-direction: column;
        gap: 1px;
      }

      .header-meta h1 {
        font-size: 13px;
        font-weight: 600;
        letter-spacing: -0.02em;
        color: var(--text-primary);
        line-height: 1.2;
      }

      .header-meta .version {
        font-family: 'JetBrains Mono', monospace;
        font-size: 9.5px;
        font-weight: 500;
        color: var(--text-dim);
        letter-spacing: 0.04em;
      }

      /* ── Status Section ── */
      .status-section {
        padding: 12px 14px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .status-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 9px 11px;
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: 8px;
        transition:
          background 0.15s ease,
          border-color 0.15s ease;
      }

      .status-row:hover {
        background: var(--bg-card-hover);
        border-color: var(--border);
      }

      .status-label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 11.5px;
        font-weight: 500;
        color: var(--text-secondary);
      }

      .status-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        flex-shrink: 0;
        transition: all 0.3s ease;
      }

      .status-dot.green {
        background: var(--accent-green);
        box-shadow:
          0 0 6px var(--accent-green),
          0 0 12px var(--accent-green-glow);
        animation: pulse-glow 2.5s ease-in-out infinite;
      }

      .status-dot.red {
        background: var(--accent-red);
        box-shadow: 0 0 6px var(--accent-red);
      }

      .status-dot.amber {
        background: var(--accent-amber);
        box-shadow: 0 0 6px var(--accent-amber);
        animation: pulse-glow 2.8s ease-in-out infinite;
      }

      .status-dot.dim {
        background: var(--text-dim);
        box-shadow: none;
      }

      .status-badge {
        font-family: 'JetBrains Mono', monospace;
        font-size: 9.5px;
        font-weight: 600;
        padding: 3px 7px;
        border-radius: 4px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        line-height: 1;
      }

      .status-badge.connected,
      .status-badge.mic-on {
        color: var(--accent-green);
        background: var(--accent-green-glow);
      }

      .status-badge.disconnected,
      .status-badge.muted {
        color: var(--accent-red);
        background: var(--accent-red-glow);
      }

      .status-badge.inactive {
        color: var(--text-dim);
        background: rgba(93, 88, 106, 0.1);
      }

      /* ── Footer ── */
      .footer {
        padding: 10px 16px 13px;
        border-top: 1px solid var(--border-subtle);
        display: flex;
        align-items: center;
      }

      .footer-hint {
        font-size: 9.5px;
        color: var(--text-dim);
        font-family: 'JetBrains Mono', monospace;
        font-weight: 500;
        letter-spacing: 0.02em;
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .footer-hint .pod-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 16px;
        height: 16px;
        background: linear-gradient(135deg, var(--brand-start), var(--brand-end));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-size: 11px;
        font-weight: 700;
      }

      .footer-hint kbd {
        display: inline-block;
        padding: 1px 5px;
        font-size: 9px;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 3px;
        color: var(--text-secondary);
        line-height: 1.4;
      }

      /* ── Animations ── */
      @keyframes pulse-glow {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.6;
        }
      }
    </style>
  </head>
  <body>
    <div class="brand-line"></div>

    <div class="header">
      <div class="header-icon">
        <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Pod mark: capsule + signal arc -->
          <defs>
            <linearGradient id="hg" x1="6.5" y1="2" x2="6.5" y2="14" gradientUnits="userSpaceOnUse">
              <stop stop-color="#FF6B35" />
              <stop offset="1" stop-color="#E91E63" />
            </linearGradient>
          </defs>
          <rect x="4.8" y="2" width="5" height="8.5" rx="2.5" fill="url(#hg)" />
          <rect x="6.6" y="9.8" width="1.2" height="3.2" rx="0.6" fill="url(#hg)" opacity="0.85" />
          <ellipse cx="7.2" cy="13.4" rx="1.2" ry="0.5" fill="url(#hg)" opacity="0.6" />
          <path
            d="M11 4.5Q13 6.5 11 8.5"
            stroke="url(#hg)"
            stroke-width="1"
            stroke-linecap="round"
            fill="none"
            opacity="0.7"
          />
          <path
            d="M12.2 3.2Q14.8 6.2 12.2 9.5"
            stroke="url(#hg)"
            stroke-width="0.7"
            stroke-linecap="round"
            fill="none"
            opacity="0.35"
          />
        </svg>
      </div>
      <div class="header-meta">
        <h1>MeetPods</h1>
        <span class="version">v0.1.0</span>
      </div>
    </div>

    <div class="status-section">
      <div class="status-row" id="row-electron">
        <div class="status-label">
          <div class="status-dot dim" id="dot-electron"></div>
          Electron App
        </div>
        <span class="status-badge disconnected" id="badge-electron">Checking</span>
      </div>

      <div class="status-row" id="row-meet">
        <div class="status-label">
          <div class="status-dot dim" id="dot-meet"></div>
          Google Meet
        </div>
        <span class="status-badge inactive" id="badge-meet">No call</span>
      </div>

      <div class="status-row" id="row-mic">
        <div class="status-label">
          <div class="status-dot dim" id="dot-mic"></div>
          Microphone
        </div>
        <span class="status-badge inactive" id="badge-mic">--</span>
      </div>
    </div>

    <div class="footer">
      <span class="footer-hint">AirPods <kbd>&#x25CF;</kbd> to toggle mute</span>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
