name: Release

on:
  push:
    tags: ['v*']

jobs:
  build-and-release:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm run rebuild:electron
      - run: npx electron-builder --publish never

      - name: Zip Chrome extension
        run: cd dist/extension && zip -r ../MeetPods-Extension-${{ github.ref_name }}.zip .

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/MeetPods-*.dmg
            dist/MeetPods-Extension-*.zip
